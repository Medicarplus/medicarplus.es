<!-- MediCar Plus · Logo Option 2 · Dark squircle + M+ dourat -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Dark squircle base · cantonades arrodonides estil TeamViewer -->
  <rect x="4" y="4" width="92" height="92" rx="28" fill="#0f172a" stroke="url(#gold)" stroke-width="4"/>
  <!-- M (Playfair-style serif, gold) -->
  <text x="46" y="72" font-family="'Playfair Display', 'DM Serif Display', Georgia, serif" font-weight="900" font-size="66" fill="#f5b301" text-anchor="middle">M</text>
  <!-- + green (Manrope-style) offset to right -->
  <text x="78" y="60" font-family="'Manrope', 'Segoe UI', system-ui, sans-serif" font-weight="900" font-size="44" fill="#22c55e" text-anchor="middle">+</text>
</svg>
